<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes" />
    <title>Onyx Bank</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="app">

        <div class="spacer"></div>

        <!-- КАРТА -->
        <div class="card">
            <div class="card-content">
                <div class="card-top">
                    <span class="bank-name">Onyx Bank</span>
                </div>
                <div class="card-number" id="cardNumber">.... 4893</div>
                <div class="card-bottom">
                    <div class="balance-wrapper">
                        <span class="balance-label">СЧЁТ</span>
                        <span class="card-balance" id="cardBalance">$0</span>
                    </div>
                    <div class="card-expiry">
                        <span>VALID THRU</span>
                        <span id="cardExpiry">12/28</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- ТРИ КНОПКИ -->
        <div class="actions">
            <button class="action-btn" id="depositBtn">
                <span class="action-icon">
                    <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <line x1="12" y1="5" x2="12" y2="19" />
                        <line x1="5" y1="12" x2="19" y2="12" />
                    </svg>
                </span>
                <span class="action-label">Пополнить</span>
            </button>
            <button class="action-btn" id="transferBtn">
                <span class="action-icon">
                    <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M7 17L17 7" />
                        <path d="M7 7h10v10" />
                    </svg>
                </span>
                <span class="action-label">Перевести</span>
            </button>
            <button class="action-btn" id="resetBtn">
                <span class="action-icon">
                    <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 12a9 9 0 1 0 9-9m0 0v6m0-6h-6" />
                    </svg>
                </span>
                <span class="action-label">Сброс</span>
            </button>
        </div>

        <!-- ИСТОРИЯ -->
        <div class="history-wrapper">
            <div class="history-header">
                <h2>Последние операции</h2>
                <button class="see-all" id="seeAllBtn">Все</button>
            </div>
            <ul class="history-list" id="transactionsList"></ul>
        </div>

    </div>

    <!-- МОДАЛКА ПОПОЛНЕНИЯ (центрированная) -->
    <div class="modal-overlay" id="depositModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Пополнение</h2>
                <button class="modal-close" id="depositModalClose">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Сумма ($)</label>
                    <input type="number" id="depositAmount" placeholder="Введите сумму" min="1" step="1" />
                </div>
                <button class="modal-btn" id="depositConfirm">Пополнить</button>
            </div>
        </div>
    </div>

    <!-- МОДАЛКА ПЕРЕВОДА (полноэкранная, с кнопкой назад) -->
    <div class="modal-overlay" id="transferModal">
        <div class="modal modal-fullscreen">
            <div class="modal-header-fullscreen">
                <button class="back-btn" id="transferModalClose">
                    <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6" />
                    </svg>
                </button>
                <span class="modal-title-fullscreen">Перевод</span>
                <div style="width:28px;"></div>
            </div>
            <div class="modal-body-fullscreen">
                <div class="form-group">
                    <label>Получатель</label>
                    <input type="text" id="transferRecipient" placeholder="Имя или номер" />
                </div>
                <div class="form-group">
                    <label>Сумма ($)</label>
                    <input type="number" id="transferAmount" placeholder="0" min="0" step="1" />
                </div>
                <div class="form-group">
                    <label>Комментарий</label>
                    <input type="text" id="transferNote" placeholder="Необязательно" />
                </div>
                <button class="modal-btn" id="transferConfirm">Отправить</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
